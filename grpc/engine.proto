syntax="proto3";

package grpc;

option go_package = "3d-engine/grpc";

import "google/protobuf/empty.proto";

service Engine {
    rpc Stream(stream EngineRequest) returns (stream EngineResponse);
}

enum Operation {
  OPERATION_UNSPECIFIED = 0;
  OPERATION_GET_OBJECTS = 1;
  OPERATION_ADD_OBJECT = 2;
  OPERATION_REMOVE_OBJECT = 3;
  OPERATION_MOVE_OBJECT = 4;
  OPERATION_ROTATE_OBJECT = 5;
  OPERATION_SCALE_OBJECT = 6;
  OPERATION_UPDATE_OBJECT = 7;
  OPERATION_LOAD_SCENE = 8;
  OPERATION_GET_SCENE_MODES = 9;
  OPERATION_LOAD_SCENE_MODE = 10;
}

message EngineRequest {
  Operation operation = 1;
  oneof body {
    google.protobuf.Empty empty = 2;
    Object object = 3;
    SceneRef scene = 4;
    SceneModeRef scene_mode = 5;
  }
}

message EngineResponse {
  Operation operation = 1;
  bool success = 2;
  string error = 3;
  oneof body {
    google.protobuf.Empty empty = 4;
    Objects objects = 5;
    Object object = 6;
    SceneModes scene_modes = 7;
  }
}

message Objects {
  repeated Object objects = 1;
}

message Object {
  string name = 1;
  uint32 id = 2;

  Location location = 3;
}

message Location {
  Vector3 position = 1;
  Vector4 rotation = 2;
  Vector3 scale = 3;
}

message Vector4 {
  float x = 1;
  float y = 2;
  float z = 3;
  float w = 4;
}

message Vector3 {
  float x = 1;
  float y = 2;
  float z = 3;
}

message SceneRef {
  string path = 1;
}

message SceneModeRef {
  string mode = 1;
}

message SceneMode {
  string name = 1;
  string path = 2;
}

message SceneModes {
  repeated SceneMode modes = 1;
  string current_mode = 2;
  string current_scene_path = 3;
}
